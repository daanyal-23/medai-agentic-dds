version: "3.9"

services:
  medai-ui:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./rag/chroma_store:/app/rag/chroma_store
      - ./traces:/app/traces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  medai-api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./rag/chroma_store:/app/rag/chroma_store
      - ./traces:/app/traces
    restart: unless-stopped
